<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — YOKO STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   YOKO STORE — Shared Design System v3
   Plus Jakarta Sans, Dark/Light theme
   ═══════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* DARK theme (default) */
:root, [data-theme="dark"] {
  --bg:       #0d0d14;
  --s1:       #151520;
  --s2:       #1c1c2e;
  --s3:       #232338;
  --blue:     #4f7aff;
  --blue2:    #738fff;
  --blue-a:   rgba(79,122,255,.15);
  --blue-b:   rgba(79,122,255,.08);
  --green:    #22c55e;
  --green-a:  rgba(34,197,94,.12);
  --gold:     #f59e0b;
  --gold-a:   rgba(245,158,11,.1);
  --red:      #f87171;
  --purple:   #a78bfa;
  --w:        #ffffff;
  --t1:       #eeeef5;
  --t2:       #8888a8;
  --t3:       #4a4a65;
  --brd:      rgba(255,255,255,.07);
  --brd2:     rgba(255,255,255,.12);
  --nav-bg:   rgba(13,13,20,.88);
  --shadow:   0 4px 24px rgba(0,0,0,.35);
  --shadow-b: 0 6px 24px rgba(79,122,255,.3);
  --card-hover-bg: #1c1c2e;
}

/* LIGHT theme */
[data-theme="light"] {
  --bg:       #f0f2ff;
  --s1:       #ffffff;
  --s2:       #f5f6ff;
  --s3:       #eceeff;
  --blue:     #4060f0;
  --blue2:    #5b78ff;
  --blue-a:   rgba(64,96,240,.1);
  --blue-b:   rgba(64,96,240,.05);
  --green:    #16a34a;
  --green-a:  rgba(22,163,74,.1);
  --gold:     #d97706;
  --gold-a:   rgba(217,119,6,.1);
  --red:      #dc2626;
  --purple:   #7c3aed;
  --w:        #0f172a;
  --t1:       #1e293b;
  --t2:       #475569;
  --t3:       #94a3b8;
  --brd:      rgba(0,0,0,.07);
  --brd2:     rgba(0,0,0,.12);
  --nav-bg:   rgba(240,242,255,.92);
  --shadow:   0 4px 24px rgba(64,96,240,.1);
  --shadow-b: 0 6px 24px rgba(64,96,240,.2);
  --card-hover-bg: #eceeff;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background .25s, color .25s;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
a { text-decoration: none; color: inherit; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: 60px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 20px;
  background: var(--nav-bg); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--brd);
  transition: background .25s;
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-ic {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: .95rem;
}
.nav-nm { font-weight: 800; font-size: .95rem; color: var(--w); }
.nav-nm span { color: var(--blue2); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-back {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 10px;
  background: var(--s1); border: 1px solid var(--brd);
  font-size: .78rem; font-weight: 600; color: var(--t2);
  transition: all .2s; cursor: pointer;
}
.nav-back:hover { background: var(--s2); color: var(--t1); }
.theme-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--s1); border: 1px solid var(--brd2);
  font-size: .95rem; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.theme-btn:hover { background: var(--s2); transform: scale(1.08); }

/* AMBIENT */
.amb { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.a-orb { position: absolute; border-radius: 50%; filter: blur(110px); }

/* PAGE & WRAP */
.page { padding: 72px 0 60px; min-height: 100vh; }
.wrap    { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
.wrap-sm { max-width: 680px;  margin: 0 auto; padding: 0 20px; }
.wrap-xs { max-width: 520px;  margin: 0 auto; padding: 0 20px; }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse  { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.7); } }
.anim  { animation: fadeUp .35s both; }
.a1x   { animation-delay: .05s; }
.a2x   { animation-delay: .12s; }
.a3x   { animation-delay: .2s;  }
.a4x   { animation-delay: .28s; }

/* SECTION TAG */
.section-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--blue-a); border: 1px solid rgba(79,122,255,.2);
  border-radius: 20px; padding: 5px 14px;
  font-size: .68rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--blue2); margin-bottom: 14px;
}
.section-title {
  font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 800;
  color: var(--w); line-height: 1.2; letter-spacing: -.3px;
}
.section-title .muted { color: var(--t3); }

/* BADGE */
.badge {
  display: inline-flex; align-items: center;
  font-size: .62rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
}
.badge-blue   { background: var(--blue-a);              color: var(--blue2); border: 1px solid rgba(79,122,255,.2); }
.badge-green  { background: var(--green-a);             color: var(--green); border: 1px solid rgba(34,197,94,.2);  }
.badge-gold   { background: var(--gold-a);              color: var(--gold);  border: 1px solid rgba(245,158,11,.2); }
.badge-purple { background: rgba(167,139,250,.1);       color: var(--purple);border: 1px solid rgba(167,139,250,.2);}

/* CARD */
.card {
  background: var(--s1); border: 1px solid var(--brd);
  border-radius: 18px; padding: 24px;
  transition: background .25s, border-color .25s;
}
.card-hover:hover {
  background: var(--card-hover-bg); border-color: var(--brd2);
  transform: translateY(-2px); box-shadow: var(--shadow);
}

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit; font-weight: 700; border: none; cursor: pointer;
  transition: all .2s; border-radius: 12px; font-size: .88rem; padding: 13px 26px;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue2); transform: translateY(-1px); box-shadow: var(--shadow-b); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-ghost  { background: var(--s2); color: var(--t1); border: 1px solid var(--brd2); }
.btn-ghost:hover { background: var(--s3); }
.btn-full { width: 100%; }
.btn-sm { padding: 9px 18px; font-size: .78rem; border-radius: 10px; }
.btn-danger  { background: rgba(248,113,113,.1); color: var(--red);   border: 1px solid rgba(248,113,113,.2); padding: 7px 12px; border-radius: 8px; font-size: .73rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-danger:hover  { background: var(--red);   color: #fff; }
.btn-confirm { background: var(--green-a);        color: var(--green); border: 1px solid rgba(34,197,94,.2);  padding: 7px 12px; border-radius: 8px; font-size: .73rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-confirm:hover { background: var(--green); color: #000; }
.btn-back { display: block; text-align: center; margin-top: 12px; font-size: .8rem; color: var(--t3); cursor: pointer; transition: color .2s; font-weight: 500; width: 100%; }
.btn-back:hover { color: var(--t1); }

/* FORM */
.f-group { margin-bottom: 16px; }
.f-label { display: block; font-size: .78rem; font-weight: 600; color: var(--t2); margin-bottom: 8px; }
.f-input {
  width: 100%; background: var(--s2); border: 1.5px solid var(--brd2);
  border-radius: 11px; padding: 12px 16px; color: var(--t1);
  font-family: inherit; font-size: .88rem; outline: none;
  transition: border-color .2s, background .25s;
}
.f-input:focus { border-color: var(--blue); }
.f-input::placeholder { color: var(--t3); }
.f-hint { font-size: .7rem; color: var(--t3); margin-top: 5px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* QTY ROW */
.qty-row { display: flex; align-items: center; gap: 10px; }
.qty-btn {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--s2); border: 1.5px solid var(--brd2);
  color: var(--t1); font-size: 1.1rem; cursor: pointer;
  transition: all .2s; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-family: inherit;
}
.qty-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-b); }
.qty-input { flex: 1; }

/* TOTAL BOX */
.total-box {
  background: linear-gradient(135deg, var(--blue-a), var(--blue-b));
  border: 1.5px solid rgba(79,122,255,.22);
  border-radius: 14px; padding: 18px 22px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.total-lbl { font-size: .8rem; font-weight: 600; color: var(--t2); }
.total-val { font-size: 1.5rem; font-weight: 800; color: var(--w); }

/* STEPS */
.steps-wrap {
  background: var(--s1); border-bottom: 1px solid var(--brd);
  padding: 0 20px; position: sticky; top: 60px; z-index: 200;
  transition: background .25s;
}
.steps { max-width: 640px; margin: 0 auto; height: 52px; display: flex; align-items: center; }
.step-i { display: flex; align-items: center; gap: 8px; }
.step-c {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--brd2);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: var(--t3);
  flex-shrink: 0; transition: all .3s;
}
.step-i.active .step-c { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 0 0 4px var(--blue-a); }
.step-i.done   .step-c { background: var(--green); border-color: var(--green); color: #fff; }
.step-l { font-size: .72rem; font-weight: 600; color: var(--t3); transition: color .3s; }
.step-i.active .step-l { color: var(--t1); }
.step-i.done   .step-l { color: var(--green); }
.step-line { flex: 1; height: 2px; background: var(--brd2); margin: 0 10px; border-radius: 1px; min-width: 24px; transition: background .3s; }
.step-i.done + .step-line { background: var(--green); }

/* PANEL */
.panel { display: none; animation: fadeUp .3s both; }
.panel.on { display: block; }

/* DETAIL CARD */
.detail-card { background: var(--s2); border: 1px solid var(--brd2); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
.dr { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--brd); }
.dr:last-child { border-bottom: none; }
.dk { font-size: .78rem; color: var(--t2); font-weight: 500; }
.dv { font-size: .82rem; font-weight: 600; color: var(--t1); text-align: right; max-width: 60%; word-break: break-all; }
.dv.gold { color: var(--gold); font-size: 1rem; font-weight: 800; }
.dv.mono { font-family: monospace; color: var(--blue2); font-size: .75rem; }

/* QRIS */
.qris-card { background: var(--s2); border: 1px solid var(--brd2); border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 16px; }
.qris-card img { max-width: 180px; border-radius: 12px; border: 3px solid var(--s3); }
.qris-hint { font-size: .72rem; color: var(--t3); margin-top: 10px; font-weight: 500; }

/* WARN BOX */
.warn-box { background: var(--gold-a); border: 1px solid rgba(245,158,11,.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; font-size: .76rem; color: var(--t2); line-height: 1.65; }
.warn-box strong { color: var(--gold); }

/* ALERT */
.alert { border-radius: 10px; padding: 10px 14px; font-size: .76rem; font-weight: 500; margin-top: 10px; display: none; }
.alert-success { background: var(--green-a); border: 1px solid rgba(34,197,94,.22); color: var(--green); }

/* MODAL */
.modal { display: none; position: fixed; inset: 0; z-index: 900; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,.65); backdrop-filter: blur(12px); }
.modal.open { display: flex; animation: fadeUp .2s both; }
.modal-box { background: var(--s1); border: 1px solid var(--brd2); border-radius: 20px; padding: 32px; width: 100%; max-width: 400px; }

/* TABLE */
.tbl-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--brd); }
table { width: 100%; border-collapse: collapse; }
th { font-size: .62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); padding: 11px 14px; text-align: left; background: var(--s1); border-bottom: 1px solid var(--brd); }
td { padding: 12px 14px; border-bottom: 1px solid var(--brd); font-size: .82rem; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--blue-b); }

/* FOOTER */
footer { padding: 24px 20px; text-align: center; border-top: 1px solid var(--brd); }
.footer-nm  { font-weight: 800; font-size: .9rem; color: var(--w); margin-bottom: 3px; }
.footer-nm span { color: var(--blue2); }
.footer-cp { font-size: .7rem; color: var(--t3); }

/* RESPONSIVE */
@media(max-width: 700px) {
  .f-row { grid-template-columns: 1fr; }
  .wrap, .wrap-sm, .wrap-xs { padding: 0 14px; }
  .card { border-radius: 14px; padding: 18px; }
}

.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.auth-box{background:var(--s1);border:1px solid var(--brd2);border-radius:22px;padding:32px;width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-ic{width:52px;height:52px;background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 10px}
.auth-title{font-size:1.1rem;font-weight:800;color:var(--w);margin-bottom:4px}
.auth-sub{font-size:.76rem;color:var(--t3)}
.f-group{margin-bottom:14px}
.f-label{display:block;font-size:.74rem;font-weight:600;color:var(--t2);margin-bottom:6px}
.f-input{width:100%;padding:11px 14px;background:var(--s2);border:1.5px solid var(--brd2);border-radius:11px;color:var(--t1);font-family:inherit;font-size:.86rem;outline:none;transition:border .2s}
.f-input:focus{border-color:var(--blue)}
.btn-auth{width:100%;padding:13px;border:none;border-radius:11px;background:var(--blue);color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-auth:hover{background:var(--blue2)}.btn-auth:disabled{opacity:.6;cursor:not-allowed}
.err-msg{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:9px;padding:9px 13px;font-size:.76rem;color:var(--red);margin-bottom:12px;display:none}
.auth-link{text-align:center;margin-top:16px;font-size:.76rem;color:var(--t3)}
.auth-link a,.auth-link span{color:var(--blue2);cursor:pointer;text-decoration:none;font-weight:600}
.auth-link a:hover,.auth-link span:hover{text-decoration:underline}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--t3);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--brd)}
</style>
</head>
<body>
<div class="amb">
  <div class="a-orb" style="width:500px;height:500px;background:radial-gradient(circle,rgba(79,122,255,.1),transparent 70%);position:absolute;top:-150px;right:-100px;border-radius:50%"></div>
  <div class="a-orb" style="width:400px;height:400px;background:radial-gradient(circle,rgba(34,197,94,.07),transparent 70%);position:absolute;bottom:-100px;left:-50px;border-radius:50%"></div>
</div>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-ic">🛍️</div>
      <div class="auth-title">YOKO<span style="color:var(--blue2)">STORE</span></div>
      <div class="auth-sub">Masuk ke akun kamu</div>
    </div>
    <div id="errMsg" class="err-msg"></div>
    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="f-group"><label class="f-label">Email</label><input class="f-input" id="lEmail" type="email" placeholder="email@contoh.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="f-group"><label class="f-label">Password</label><input class="f-input" id="lPass" type="password" placeholder="Password kamu" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div style="text-align:right;margin-top:-8px;margin-bottom:14px"><span style="font-size:.74rem;color:var(--blue2);cursor:pointer;font-weight:600" onclick="switchMode('forgot')">Lupa password?</span></div>
      <button class="btn-auth" id="loginBtn" onclick="doLogin()">Masuk</button>
      <div class="divider">atau</div>
      <div class="auth-link">Belum punya akun? <a href="register.html">Daftar sekarang</a></div>
    </div>
    <!-- FORGOT FORM -->
    <div id="forgotForm" style="display:none">
      <div style="margin-bottom:16px;font-size:.82rem;color:var(--t2);line-height:1.7">Masukkan email kamu, kami kirimkan link untuk reset password.</div>
      <div class="f-group"><label class="f-label">Email</label><input class="f-input" id="fEmail" type="email" placeholder="email@contoh.com"></div>
      <button class="btn-auth" id="forgotBtn" onclick="doForgot()">Kirim Link Reset</button>
      <div class="auth-link" style="margin-top:12px"><span onclick="switchMode('login')">← Kembali ke Login</span></div>
    </div>
    <div class="divider" style="margin-top:20px"></div>
    <div style="text-align:center"><a href="welcome.html" style="font-size:.74rem;color:var(--t3);text-decoration:none">← Kembali ke Beranda</a></div>
  </div>
</div>
<script>
const TK='yoko_theme';
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem(TK,t);}
(function(){applyTheme(localStorage.getItem(TK)||'dark');})();

var _FBCFG={apiKey:"AIzaSyCS52l1z6DrfkqIn4WB4SEOE6hdVu2mX6w",authDomain:"yokotofxport.firebaseapp.com",databaseURL:"https://yokotofxport-default-rtdb.firebaseio.com",projectId:"yokotofxport",storageBucket:"yokotofxport.firebasestorage.app",messagingSenderId:"515300744861",appId:"1:515300744861:web:01117e3f5dc7ed755cbe74"};
var _app=null,_auth=null,_db=null,_cfg=null;

async function getFB(){
  if(_app)return{app:_app,auth:_auth,db:_db};
  var fc=JSON.parse(localStorage.getItem('yoko_firebase_config')||'null')||_FBCFG;
  var a=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  var au=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  _app=a.getApps().find(function(x){return x.name==='yoko';})||a.initializeApp(fc,'yoko');
  _auth=au.getAuth(_app);
  _db=d.getDatabase(_app);
  return{app:_app,auth:_auth,db:_db};
}
async function getCfg(){
  if(_cfg)return _cfg;
  var fb=await getFB();
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  var s=await d.get(d.ref(fb.db,'config'));
  _cfg=s.exists()?s.val():{};return _cfg;
}
async function getDB(){
  var fb=await getFB();return fb.db;
}
async function dbGet(path){
  var fb=await getFB();
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  var s=await d.get(d.ref(fb.db,path));return s.exists()?s.val():null;
}
async function dbSet(path,data){
  var fb=await getFB();
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  await d.set(d.ref(fb.db,path),data);
}
async function dbUpdate(path,data){
  var fb=await getFB();
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  await d.update(d.ref(fb.db,path),data);
}
async function dbPush(path,data){
  var fb=await getFB();
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  var r=await d.push(d.ref(fb.db,path),data);return r.key;
}
async function dbRemove(path){
  var fb=await getFB();
  var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  await d.remove(d.ref(fb.db,path));
}
async function getCurrentUser(){
  var fb=await getFB();
  return new Promise(function(resolve){
    var au=fb.auth;
    if(au.currentUser)return resolve(au.currentUser);
    var unsub;
    var mod;
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js').then(function(m){
      mod=m;
      unsub=m.onAuthStateChanged(au,function(u){unsub();resolve(u);});
    });
  });
}
async function getUserData(uid){
  return await dbGet('users/'+uid);
}
async function requireAuth(redirectTo){
  var u=await getCurrentUser();
  if(!u){window.location.replace(redirectTo||'login.html');return null;}
  return u;
}
function genTRX(prefix){return (prefix||'TRX')+'-'+Date.now().toString(36).toUpperCase().slice(-8);}


var mode='login'; // login | forgot

function switchMode(m){
  mode=m;
  document.getElementById('loginForm').style.display=m==='login'?'block':'none';
  document.getElementById('forgotForm').style.display=m==='forgot'?'block':'none';
  document.getElementById('errMsg').style.display='none';
}

async function doLogin(){
  var email=document.getElementById('lEmail').value.trim();
  var pass=document.getElementById('lPass').value;
  var err=document.getElementById('errMsg');
  if(!email||!pass){showErr('Email dan password wajib diisi!');return;}
  var btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Masuk...';
  try{
    var fb=await getFB();
    var m=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    await m.signInWithEmailAndPassword(fb.auth,email,pass);
    var redir=new URLSearchParams(location.search).get('from')||'welcome.html';
    window.location.replace(redir);
  }catch(e){
    var msg='Email atau password salah.';
    if(e.code==='auth/user-not-found')msg='Akun tidak ditemukan.';
    if(e.code==='auth/wrong-password')msg='Password salah.';
    if(e.code==='auth/too-many-requests')msg='Terlalu banyak percobaan. Coba lagi nanti.';
    if(e.code==='auth/invalid-email')msg='Format email tidak valid.';
    showErr(msg);btn.disabled=false;btn.textContent='Masuk';
  }
}

async function doForgot(){
  var email=document.getElementById('fEmail').value.trim();
  if(!email){showErr('Masukkan email kamu!');return;}
  var btn=document.getElementById('forgotBtn');btn.disabled=true;btn.textContent='Mengirim...';
  try{
    var fb=await getFB();
    var m=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    await m.sendPasswordResetEmail(fb.auth,email);
    var box=document.getElementById('forgotForm');
    box.innerHTML='';
    var wrap=document.createElement('div');
    wrap.style.cssText='text-align:center;padding:20px 0';
    wrap.innerHTML='<div style="font-size:2.5rem;margin-bottom:12px">📧</div><div style="font-weight:700;color:var(--w,#fff);margin-bottom:8px">Email Terkirim!</div><p style="font-size:.82rem;color:var(--t2,#888);line-height:1.7">Link reset dikirim ke <strong>'+email+'</strong>.</p>';
    var backBtn=document.createElement('button');
    backBtn.textContent='Kembali ke Login';
    backBtn.style.cssText='margin-top:16px;padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer';
    backBtn.onclick=function(){switchMode('login');};
    wrap.appendChild(backBtn);
    box.appendChild(wrap);
  }catch(e){
    var msg='Gagal kirim email.';
    if(e.code==='auth/user-not-found')msg='Email tidak terdaftar.';
    if(e.code==='auth/invalid-email')msg='Format email tidak valid.';
    showErr(msg);btn.disabled=false;btn.textContent='Kirim Link Reset';
  }
}

function showErr(msg){
  var e=document.getElementById('errMsg');e.textContent=msg;e.style.display='block';
}

// Kalau udah login, redirect
(async function(){
  var u=await getCurrentUser();
  if(u){
    var redir=new URLSearchParams(location.search).get('from')||'welcome.html';
    window.location.replace(redir);
  }
})();
