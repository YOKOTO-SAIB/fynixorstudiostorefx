<style>
/* ═══════════════════════════════════════════
   YOKO STORE — Shared Design System v3
   Plus Jakarta Sans, Dark/Light theme
   ═══════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* DARK theme (default) */
:root, [data-theme="dark"] {
  --bg:       #0d0d14;
  --s1:       #151520;
  --s2:       #1c1c2e;
  --s3:       #232338;
  --blue:     #4f7aff;
  --blue2:    #738fff;
  --blue-a:   rgba(79,122,255,.15);
  --blue-b:   rgba(79,122,255,.08);
  --green:    #22c55e;
  --green-a:  rgba(34,197,94,.12);
  --gold:     #f59e0b;
  --gold-a:   rgba(245,158,11,.1);
  --red:      #f87171;
  --purple:   #a78bfa;
  --w:        #ffffff;
  --t1:       #eeeef5;
  --t2:       #8888a8;
  --t3:       #4a4a65;
  --brd:      rgba(255,255,255,.07);
  --brd2:     rgba(255,255,255,.12);
  --nav-bg:   rgba(13,13,20,.88);
  --shadow:   0 4px 24px rgba(0,0,0,.35);
  --shadow-b: 0 6px 24px rgba(79,122,255,.3);
  --card-hover-bg: #1c1c2e;
}

/* LIGHT theme */
[data-theme="light"] {
  --bg:       #f0f2ff;
  --s1:       #ffffff;
  --s2:       #f5f6ff;
  --s3:       #eceeff;
  --blue:     #4060f0;
  --blue2:    #5b78ff;
  --blue-a:   rgba(64,96,240,.1);
  --blue-b:   rgba(64,96,240,.05);
  --green:    #16a34a;
  --green-a:  rgba(22,163,74,.1);
  --gold:     #d97706;
  --gold-a:   rgba(217,119,6,.1);
  --red:      #dc2626;
  --purple:   #7c3aed;
  --w:        #0f172a;
  --t1:       #1e293b;
  --t2:       #475569;
  --t3:       #94a3b8;
  --brd:      rgba(0,0,0,.07);
  --brd2:     rgba(0,0,0,.12);
  --nav-bg:   rgba(240,242,255,.92);
  --shadow:   0 4px 24px rgba(64,96,240,.1);
  --shadow-b: 0 6px 24px rgba(64,96,240,.2);
  --card-hover-bg: #eceeff;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background .25s, color .25s;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
a { text-decoration: none; color: inherit; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: 60px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 20px;
  background: var(--nav-bg); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--brd);
  transition: background .25s;
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-ic {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: .95rem;
}
.nav-nm { font-weight: 800; font-size: .95rem; color: var(--w); }
.nav-nm span { color: var(--blue2); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-back {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 10px;
  background: var(--s1); border: 1px solid var(--brd);
  font-size: .78rem; font-weight: 600; color: var(--t2);
  transition: all .2s; cursor: pointer;
}
.nav-back:hover { background: var(--s2); color: var(--t1); }
.theme-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--s1); border: 1px solid var(--brd2);
  font-size: .95rem; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.theme-btn:hover { background: var(--s2); transform: scale(1.08); }

/* AMBIENT */
.amb { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.a-orb { position: absolute; border-radius: 50%; filter: blur(110px); }

/* PAGE & WRAP */
.page { padding: 72px 0 60px; min-height: 100vh; }
.wrap    { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
.wrap-sm { max-width: 680px;  margin: 0 auto; padding: 0 20px; }
.wrap-xs { max-width: 520px;  margin: 0 auto; padding: 0 20px; }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse  { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.7); } }
.anim  { animation: fadeUp .35s both; }
.a1x   { animation-delay: .05s; }
.a2x   { animation-delay: .12s; }
.a3x   { animation-delay: .2s;  }
.a4x   { animation-delay: .28s; }

/* SECTION TAG */
.section-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--blue-a); border: 1px solid rgba(79,122,255,.2);
  border-radius: 20px; padding: 5px 14px;
  font-size: .68rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--blue2); margin-bottom: 14px;
}
.section-title {
  font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 800;
  color: var(--w); line-height: 1.2; letter-spacing: -.3px;
}
.section-title .muted { color: var(--t3); }

/* BADGE */
.badge {
  display: inline-flex; align-items: center;
  font-size: .62rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
}
.badge-blue   { background: var(--blue-a);              color: var(--blue2); border: 1px solid rgba(79,122,255,.2); }
.badge-green  { background: var(--green-a);             color: var(--green); border: 1px solid rgba(34,197,94,.2);  }
.badge-gold   { background: var(--gold-a);              color: var(--gold);  border: 1px solid rgba(245,158,11,.2); }
.badge-purple { background: rgba(167,139,250,.1);       color: var(--purple);border: 1px solid rgba(167,139,250,.2);}

/* CARD */
.card {
  background: var(--s1); border: 1px solid var(--brd);
  border-radius: 18px; padding: 24px;
  transition: background .25s, border-color .25s;
}
.card-hover:hover {
  background: var(--card-hover-bg); border-color: var(--brd2);
  transform: translateY(-2px); box-shadow: var(--shadow);
}

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit; font-weight: 700; border: none; cursor: pointer;
  transition: all .2s; border-radius: 12px; font-size: .88rem; padding: 13px 26px;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue2); transform: translateY(-1px); box-shadow: var(--shadow-b); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-ghost  { background: var(--s2); color: var(--t1); border: 1px solid var(--brd2); }
.btn-ghost:hover { background: var(--s3); }
.btn-full { width: 100%; }
.btn-sm { padding: 9px 18px; font-size: .78rem; border-radius: 10px; }
.btn-danger  { background: rgba(248,113,113,.1); color: var(--red);   border: 1px solid rgba(248,113,113,.2); padding: 7px 12px; border-radius: 8px; font-size: .73rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-danger:hover  { background: var(--red);   color: #fff; }
.btn-confirm { background: var(--green-a);        color: var(--green); border: 1px solid rgba(34,197,94,.2);  padding: 7px 12px; border-radius: 8px; font-size: .73rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-confirm:hover { background: var(--green); color: #000; }
.btn-back { display: block; text-align: center; margin-top: 12px; font-size: .8rem; color: var(--t3); cursor: pointer; transition: color .2s; font-weight: 500; width: 100%; }
.btn-back:hover { color: var(--t1); }

/* FORM */
.f-group { margin-bottom: 16px; }
.f-label { display: block; font-size: .78rem; font-weight: 600; color: var(--t2); margin-bottom: 8px; }
.f-input {
  width: 100%; background: var(--s2); border: 1.5px solid var(--brd2);
  border-radius: 11px; padding: 12px 16px; color: var(--t1);
  font-family: inherit; font-size: .88rem; outline: none;
  transition: border-color .2s, background .25s;
}
.f-input:focus { border-color: var(--blue); }
.f-input::placeholder { color: var(--t3); }
.f-hint { font-size: .7rem; color: var(--t3); margin-top: 5px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* QTY ROW */
.qty-row { display: flex; align-items: center; gap: 10px; }
.qty-btn {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--s2); border: 1.5px solid var(--brd2);
  color: var(--t1); font-size: 1.1rem; cursor: pointer;
  transition: all .2s; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-family: inherit;
}
.qty-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-b); }
.qty-input { flex: 1; }

/* TOTAL BOX */
.total-box {
  background: linear-gradient(135deg, var(--blue-a), var(--blue-b));
  border: 1.5px solid rgba(79,122,255,.22);
  border-radius: 14px; padding: 18px 22px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.total-lbl { font-size: .8rem; font-weight: 600; color: var(--t2); }
.total-val { font-size: 1.5rem; font-weight: 800; color: var(--w); }

/* STEPS */
.steps-wrap {
  background: var(--s1); border-bottom: 1px solid var(--brd);
  padding: 0 20px; position: sticky; top: 60px; z-index: 200;
  transition: background .25s;
}
.steps { max-width: 640px; margin: 0 auto; height: 52px; display: flex; align-items: center; }
.step-i { display: flex; align-items: center; gap: 8px; }
.step-c {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--brd2);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: var(--t3);
  flex-shrink: 0; transition: all .3s;
}
.step-i.active .step-c { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 0 0 4px var(--blue-a); }
.step-i.done   .step-c { background: var(--green); border-color: var(--green); color: #fff; }
.step-l { font-size: .72rem; font-weight: 600; color: var(--t3); transition: color .3s; }
.step-i.active .step-l { color: var(--t1); }
.step-i.done   .step-l { color: var(--green); }
.step-line { flex: 1; height: 2px; background: var(--brd2); margin: 0 10px; border-radius: 1px; min-width: 24px; transition: background .3s; }
.step-i.done + .step-line { background: var(--green); }

/* PANEL */
.panel { display: none; animation: fadeUp .3s both; }
.panel.on { display: block; }

/* DETAIL CARD */
.detail-card { background: var(--s2); border: 1px solid var(--brd2); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
.dr { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--brd); }
.dr:last-child { border-bottom: none; }
.dk { font-size: .78rem; color: var(--t2); font-weight: 500; }
.dv { font-size: .82rem; font-weight: 600; color: var(--t1); text-align: right; max-width: 60%; word-break: break-all; }
.dv.gold { color: var(--gold); font-size: 1rem; font-weight: 800; }
.dv.mono { font-family: monospace; color: var(--blue2); font-size: .75rem; }

/* QRIS */
.qris-card { background: var(--s2); border: 1px solid var(--brd2); border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 16px; }
.qris-card img { max-width: 180px; border-radius: 12px; border: 3px solid var(--s3); }
.qris-hint { font-size: .72rem; color: var(--t3); margin-top: 10px; font-weight: 500; }

/* WARN BOX */
.warn-box { background: var(--gold-a); border: 1px solid rgba(245,158,11,.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; font-size: .76rem; color: var(--t2); line-height: 1.65; }
.warn-box strong { color: var(--gold); }

/* ALERT */
.alert { border-radius: 10px; padding: 10px 14px; font-size: .76rem; font-weight: 500; margin-top: 10px; display: none; }
.alert-success { background: var(--green-a); border: 1px solid rgba(34,197,94,.22); color: var(--green); }

/* MODAL */
.modal { display: none; position: fixed; inset: 0; z-index: 900; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,.65); backdrop-filter: blur(12px); }
.modal.open { display: flex; animation: fadeUp .2s both; }
.modal-box { background: var(--s1); border: 1px solid var(--brd2); border-radius: 20px; padding: 32px; width: 100%; max-width: 400px; }

/* TABLE */
.tbl-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--brd); }
table { width: 100%; border-collapse: collapse; }
th { font-size: .62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); padding: 11px 14px; text-align: left; background: var(--s1); border-bottom: 1px solid var(--brd); }
td { padding: 12px 14px; border-bottom: 1px solid var(--brd); font-size: .82rem; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--blue-b); }

/* FOOTER */
footer { padding: 24px 20px; text-align: center; border-top: 1px solid var(--brd); }
.footer-nm  { font-weight: 800; font-size: .9rem; color: var(--w); margin-bottom: 3px; }
.footer-nm span { color: var(--blue2); }
.footer-cp { font-size: .7rem; color: var(--t3); }

/* RESPONSIVE */
@media(max-width: 700px) {
  .f-row { grid-template-columns: 1fr; }
  .wrap, .wrap-sm, .wrap-xs { padding: 0 14px; }
  .card { border-radius: 14px; padding: 18px; }
}

    var a=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    var app=a.getApps().find(x=>x.name==='yoko')||a.initializeApp(fc,'yoko');
    _db=d.getDatabase(app);return _db;
  }catch(e){return null;}
}
async function getCfg(){
  if(_cfg)return _cfg;
  var db=await getDB();if(!db)return{};
  try{
    var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    var s=await d.get(d.ref(db,'config'));
    _cfg=s.exists()?s.val():{};return _cfg;
  }catch(e){return{};}
}
async function setCfg(data){
  var db=await getDB();if(!db)return false;
  try{
    var d=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    await d.update(d.ref(db,'config'),data);_cfg=null;return true;
  }catch(e){return false;}
}


var prodId='',prodData=null,stockCount=0,trxId='';
function genTRX(){return 'TRX-'+Date.now().toString(36).toUpperCase().slice(-8);}
function setStep(n){
  [1,2,3].forEach(function(i){
    var p=document.getElementById('p'+i);
    if(p)p.style.display=i===n?'block':'none';
    var s=document.getElementById('si'+i);
    if(!s)return;
    s.className='step-i'+(i<n?' done':i===n?' active':'');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
async function loadProduk(){
  var p=new URLSearchParams(location.search);
  prodId=p.get('id');
  if(!prodId){document.getElementById('prodBanner').innerHTML='<p style="color:var(--red)">Produk tidak ditemukan.</p>';return;}
  var db=await getDB();
  if(!db){document.getElementById('stockInfo').textContent='Firebase belum setup';return;}
  var m=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  var ps=await m.get(m.ref(db,'products/'+prodId));
  var cs=await m.get(m.ref(db,'categories'));
  var ds=await m.get(m.ref(db,'descriptions/'+prodId));
  if(!ps.exists()){document.getElementById('prodBanner').innerHTML='<p style="color:var(--red)">Produk tidak ditemukan.</p>';return;}
  prodData=ps.val();
  stockCount=0;if(ds.exists())ds.forEach(function(){stockCount++;});
  var catName='';
  if(cs.exists()&&prodData.categoryId){var c=cs.child(prodData.categoryId);if(c.exists())catName=(c.val().icon||'')+' '+c.val().name;}
  document.getElementById('prodIc').textContent=prodData.icon||'📦';
  document.getElementById('prodName').textContent=prodData.name;
  document.getElementById('prodCat').textContent=catName;
  document.getElementById('prodPrice').textContent='Rp '+(prodData.price||0).toLocaleString('id');
  var si=document.getElementById('stockInfo');
  if(stockCount<=0){
    si.style.cssText='background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:20px;padding:4px 12px;font-size:.7rem;font-weight:700;color:var(--red);display:inline-block';
    si.textContent='Stok habis';
    document.getElementById('toPayBtn').disabled=true;
    document.getElementById('toPayBtn').textContent='Stok Habis';
  }else{
    si.style.cssText='background:var(--green-a);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 12px;font-size:.7rem;font-weight:700;color:var(--green);display:inline-block';
    si.textContent=stockCount+' tersedia';
  }
}
async function goStep2(){
  var name=document.getElementById('custName').value.trim();
  var email=document.getElementById('custEmail').value.trim();
  var err=document.getElementById('step1Err');
  if(!name||!email){err.style.display='block';err.textContent='Nama dan email wajib!';return;}
  if(!email.includes('@')){err.style.display='block';err.textContent='Format email tidak valid!';return;}
  if(stockCount<=0){alert('Stok habis!');return;}
  trxId=genTRX();setStep(2);await buildPaySection();
}
async function buildPaySection(){
  var cfg=await getCfg();
  var total=prodData?prodData.price:0;
  var totalFmt=(total||0).toLocaleString('id');
  var custName=document.getElementById('custName').value.trim();
  var qHTML=cfg.qrisImage
    ?'<img src="'+cfg.qrisImage+'" style="max-width:180px;border-radius:12px;border:3px solid var(--s3)"><div style="font-size:.72rem;color:var(--t3);margin-top:6px">Scan QR untuk membayar</div>'
    :'<div style="font-size:.82rem;color:var(--t3)">QRIS belum dikonfigurasi admin</div>';
  var html='<div class="ocard">';
  html+='<div class="ocard-title">Scan & Bayar</div>';
  html+='<div class="ocard-sub">Transfer tepat sesuai nominal lalu upload bukti</div>';
  html+='<div style="text-align:center;margin-bottom:16px">'+qHTML+'</div>';
  html+='<div class="detail-box">';
  html+='<div class="dr"><span class="dk">ID Transaksi</span><span class="dv" style="font-family:monospace;color:var(--blue2);font-size:.72rem">'+trxId+'</span></div>';
  html+='<div class="dr"><span class="dk">Produk</span><span class="dv">'+(prodData.icon||'')+' '+prodData.name+'</span></div>';
  html+='<div class="dr"><span class="dk">Nama</span><span class="dv">'+custName+'</span></div>';
  html+='<div class="dr" style="border:none"><span class="dk">Total</span><span class="dv" style="color:var(--gold);font-weight:800;font-size:.95rem">Rp '+totalFmt+'</span></div>';
  html+='</div>';
  html+='<div style="background:var(--gold-a);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:.76rem;color:var(--t2)">Transfer tepat <strong style="color:var(--gold)">Rp '+totalFmt+'</strong> agar mudah diverifikasi.</div>';
  html+='<div class="f-group"><label class="f-label">Upload Bukti Transfer</label><input class="f-input" id="buktiFile" type="file" accept="image/*" style="padding:10px;cursor:pointer"></div>';
  html+='<button class="btn-primary" id="konfBtn" onclick="submitOrder()">✅ Konfirmasi Sudah Bayar</button>';
  html+='<div style="display:none;font-size:.76rem;color:var(--red);margin-top:8px;text-align:center" id="payErr"></div>';
  html+='</div>';
  document.getElementById('paySection').innerHTML=html;
}
async function submitOrder(){
  var file=document.getElementById('buktiFile').files[0];
  if(!file){document.getElementById('payErr').style.display='block';document.getElementById('payErr').textContent='Upload bukti transfer dulu!';return;}
  var btn=document.getElementById('konfBtn');btn.disabled=true;btn.textContent='Memproses...';
  var cfg=await getCfg();
  var custName=document.getElementById('custName').value.trim();
  var custEmail=document.getElementById('custEmail').value.trim();
  var proofUrl='';
  if(cfg.botToken&&cfg.chatId){
    try{
      var fd=new FormData();
      fd.append('chat_id',cfg.chatId);
      fd.append('photo',file);
      fd.append('caption','ORDER BARU\nID: '+trxId+'\nProduk: '+prodData.name+'\nHarga: Rp '+(prodData.price||0).toLocaleString('id')+'\nNama: '+custName+'\nEmail: '+custEmail);
      var r=await fetch('https://api.telegram.org/bot'+cfg.botToken+'/sendPhoto',{method:'POST',body:fd});
      var rj=await r.json();
      if(rj.ok&&rj.result&&rj.result.photo){
        var fid=rj.result.photo[rj.result.photo.length-1].file_id;
        var fp=await(await fetch('https://api.telegram.org/bot'+cfg.botToken+'/getFile?file_id='+fid)).json();
        if(fp.ok)proofUrl='https://api.telegram.org/file/bot'+cfg.botToken+'/'+fp.result.file_path;
      }
    }catch(e){}
  }
  var descContent='';var descKey='';
  try{
    var db=await getDB();
    if(db){
      var m=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
      var ds=await m.get(m.ref(db,'descriptions/'+prodId));
      if(ds.exists()){
        var keys=[];ds.forEach(function(d){keys.push(d.key);});
        descKey=keys[Math.floor(Math.random()*keys.length)];
        descContent=ds.child(descKey).val().content||'';
        await m.remove(m.ref(db,'descriptions/'+prodId+'/'+descKey));
      }
    }
  }catch(e){}
  try{
    var db2=await getDB();
    if(db2){
      var m2=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
      await m2.push(m2.ref(db2,'orders'),{trxId:trxId,productId:prodId,productName:prodData.name,price:prodData.price,total:prodData.price,name:custName,email:custEmail,descContent:descContent,proofUrl:proofUrl,status:descContent?'sent':'pending',timestamp:Date.now()});
    }
  }catch(e){}
  if(descContent&&cfg.botToken&&cfg.chatId){
    try{
      fetch('https://api.telegram.org/bot'+cfg.botToken+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:cfg.chatId,text:'STOK TERKIRIM\nID: '+trxId+'\nProduk: '+prodData.name+'\nNama: '+custName+'\nEmail: '+custEmail})});
    }catch(e){}
  }
  if(descContent&&cfg.ejPk&&cfg.ejSv&&cfg.ejTm){
    try{
      await import('https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js');
      emailjs.init(cfg.ejPk);
      await emailjs.send(cfg.ejSv,cfg.ejTm,{to_email:custEmail,customer_name:custName,product_name:prodData.name,desc_content:descContent,trx_id:trxId,store_name:cfg.siteName||'YOKO STORE'});
    }catch(e){}
  }
  setStep(3);
  var hasDesc=!!descContent;
  var html='';
  html+='<div class="ocard" style="text-align:center;padding:32px">';
  html+='<div style="font-size:3rem;margin-bottom:12px">'+(hasDesc?'🎉':'⏳')+'</div>';
  html+='<div style="font-size:1.05rem;font-weight:800;color:var(--w);margin-bottom:6px">'+(hasDesc?'Pesanan Berhasil!':'Pesanan Diterima!')+'</div>';
  html+='<div style="font-size:.8rem;color:var(--t2)">ID: <span style="font-family:monospace;color:var(--blue2)">'+trxId+'</span></div>';
  html+='</div>';
  if(hasDesc){
    html+='<div style="background:var(--s1);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:12px">';
    html+='<div style="font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue2);margin-bottom:10px">Produk Kamu</div>';
    html+='<div id="descBox" style="background:var(--s2);border:1px solid var(--brd2);border-radius:10px;padding:14px;font-family:monospace;font-size:.82rem;color:var(--t1);white-space:pre-wrap;word-break:break-all;line-height:1.7">'+descContent+'</div>';
    html+='<button id="copyBtn" onclick="doCopy()" style="margin-top:10px;padding:8px 18px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit">📋 Salin</button>';
    html+='</div>';
    if(cfg.ejPk){
      html+='<div style="font-size:.78rem;color:var(--t2);text-align:center;margin-bottom:12px">📧 Salinan dikirim ke <strong>'+custEmail+'</strong></div>';
    }
  }else{
    html+='<div style="background:var(--gold-a);border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:16px;margin-bottom:12px;font-size:.82rem;color:var(--t2);line-height:1.7;text-align:center">Pembayaran sedang diverifikasi admin. Produk akan dikirim ke email kamu.</div>';
  }
  html+='<a href="welcome.html" style="display:block;text-align:center;padding:12px;background:var(--blue);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;font-size:.85rem">🏠 Kembali ke Beranda</a>';
  document.getElementById('resultSection').innerHTML=html;
}
function doCopy(){var el=document.getElementById('descBox');if(!el)return;navigator.clipboard.writeText(el.textContent).then(function(){var btn=document.getElementById('copyBtn');if(btn)btn.textContent='✓ Tersalin!';});}
loadProduk();

</script>
</body></html>
